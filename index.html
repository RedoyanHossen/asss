<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time AI Object Scanner</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TensorFlow.js Core -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- TensorFlow.js COCO-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        /* Custom scrollbar and minor tweaks */
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gray-950 text-white h-[100dvh] flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 p-4 shadow-md z-10">
        <div class="container mx-auto max-w-4xl flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <h1 class="text-xl md:text-2xl font-bold tracking-wide">Vision<span class="text-cyan-400">Scan</span></h1>
            </div>
            <div id="statusBadge" class="hidden items-center gap-2 px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm font-medium border border-yellow-500/30">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                </span>
                Model Loading...
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-full flex flex-col relative bg-black">
        
        <!-- Camera Container (Edge-to-edge on mobile) -->
        <div class="relative w-full flex-grow overflow-hidden flex items-center justify-center">
            
            <!-- Video Feed -->
            <video id="webcam" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover hidden"></video>
            
            <!-- Canvas Overlay for Bounding Boxes -->
            <canvas id="canvas" class="absolute inset-0 w-full h-full object-cover z-10 pointer-events-none"></canvas>

            <!-- Placeholder / Instructions -->
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 p-8 text-center z-0 bg-gray-950">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mb-6 opacity-40 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <p class="text-lg md:text-xl max-w-md font-light">Ready to scan. Grant camera access and tap <strong class="text-white font-semibold">Start</strong> below.</p>
            </div>
        </div>

        <!-- Controls (Bottom Sheet Style) -->
        <div class="w-full bg-gray-900/95 backdrop-blur-xl border-t border-gray-800 p-6 pb-8 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col gap-4 items-center rounded-t-3xl md:rounded-none">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mb-2 md:hidden"></div>
            
            <div class="flex flex-col md:flex-row gap-4 w-full max-w-2xl justify-between items-center text-center md:text-left">
                <div>
                    <h2 class="text-lg font-bold text-gray-100 tracking-wide">Scanner Controls</h2>
                    <p class="text-sm text-gray-400">Powered by TensorFlow.js</p>
                </div>
                
                <div class="flex gap-3 w-full md:w-auto mt-2 md:mt-0">
                    <button id="startBtn" disabled class="flex-1 md:flex-none px-8 py-4 bg-cyan-600 hover:bg-cyan-500 disabled:bg-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-bold text-lg rounded-2xl shadow-lg shadow-cyan-900/50 transition-all duration-200 flex justify-center items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                        </svg>
                        Start
                    </button>
                    <button id="stopBtn" class="hidden flex-1 md:flex-none px-8 py-4 bg-red-600 hover:bg-red-500 text-white font-bold text-lg rounded-2xl shadow-lg shadow-red-900/50 transition-all duration-200 flex justify-center items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" />
                        </svg>
                        Stop
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        // DOM Elements
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const placeholder = document.getElementById('placeholder');
        const statusBadge = document.getElementById('statusBadge');

        // App State
        let model = null;
        let isScanning = false;
        let animationId = null;
        let stream = null;

        // Initialize the app by loading the model
        async function init() {
            statusBadge.classList.remove('hidden');
            statusBadge.classList.add('flex');
            
            try {
                // Load the COCO-SSD model from TensorFlow.js
                model = await cocoSsd.load();
                
                // Update UI once loaded
                statusBadge.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    Model Ready
                `;
                statusBadge.classList.replace('bg-yellow-500/20', 'bg-green-500/20');
                statusBadge.classList.replace('text-yellow-400', 'text-green-400');
                statusBadge.classList.replace('border-yellow-500/30', 'border-green-500/30');
                
                // Enable start button
                startBtn.disabled = false;
            } catch (error) {
                console.error("Error loading model:", error);
                statusBadge.innerHTML = `Error Loading Model`;
                statusBadge.classList.replace('bg-yellow-500/20', 'bg-red-500/20');
                statusBadge.classList.replace('text-yellow-400', 'text-red-400');
            }
        }

        // Setup the webcam stream
        async function setupCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("Camera API is not supported in this browser.");
            }

            // Prefer the back-facing camera on mobile devices
            const constraints = {
                video: { facingMode: 'environment' },
                audio: false
            };

            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;

            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    resolve(video);
                };
            });
        }

        // The main detection loop
        async function detectFrame() {
            if (!isScanning) return;

            // Ensure canvas matches the video dimensions exactly
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // Run object detection on the current video frame
            const predictions = await model.detect(video);

            // Clear previous drawings
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw new predictions
            predictions.forEach(prediction => {
                // prediction object contains: [x, y, width, height], class, and score
                const [x, y, width, height] = prediction.bbox;
                const score = Math.round(prediction.score * 100);
                const text = `${prediction.class.toUpperCase()} - ${score}%`;

                // 1. Draw Bounding Box
                ctx.strokeStyle = '#06b6d4'; // Tailwind cyan-500
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);

                // 2. Draw Label Background
                ctx.font = 'bold 16px Inter, sans-serif';
                const textWidth = ctx.measureText(text).width;
                ctx.fillStyle = '#06b6d4';
                // Draw background slightly inside the top-left of the box
                ctx.fillRect(x, y, textWidth + 16, 30);

                // 3. Draw Label Text
                ctx.fillStyle = '#ffffff';
                ctx.fillText(text, x + 8, y + 21);
            });

            // Loop recursively using requestAnimationFrame for smooth drawing
            animationId = requestAnimationFrame(detectFrame);
        }

        // Start scanning event
        startBtn.addEventListener('click', async () => {
            try {
                // Disable button during startup
                startBtn.disabled = true;
                startBtn.innerHTML = `
                    <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Starting...
                `;

                await setupCamera();
                video.classList.remove('hidden');
                placeholder.classList.add('hidden');
                
                // Toggle buttons
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                
                isScanning = true;
                detectFrame(); // Start the loop

            } catch (err) {
                alert('Could not access camera. Please ensure permissions are granted.');
                console.error(err);
                startBtn.disabled = false;
                startBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                    </svg>
                    Start
                `;
            }
        });

        // Stop scanning event
        stopBtn.addEventListener('click', () => {
            isScanning = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            // Stop the camera tracks
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            // Update UI
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            video.classList.add('hidden');
            placeholder.classList.remove('hidden');
            
            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.disabled = false;
            startBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                Start
            `;
        });

        // Boot up the application
        init();

    </script>
</body>
</html>
